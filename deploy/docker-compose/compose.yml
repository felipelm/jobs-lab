services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://jobs_lab:jobs_lab@postgres:5432/jobs_lab
      REDIS_URL: redis://redis:6379/0
      JOBS_LAB_ENV: local
      OTEL_ENABLED: "${OTEL_ENABLED:-true}"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    command: ["python", "-m", "apps.worker.main"]
    environment:
      DATABASE_URL: postgresql+asyncpg://jobs_lab:jobs_lab@postgres:5432/jobs_lab
      REDIS_URL: redis://redis:6379/0
      JOBS_LAB_ENV: local
      JOBS_LAB_WORKER_POLL_INTERVAL_SECONDS: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobs_lab
      POSTGRES_USER: jobs_lab
      POSTGRES_PASSWORD: jobs_lab
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs_lab -d jobs_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.138.0
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./otel-collector.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      jaeger:
        condition: service_started
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"

  jaeger:
    image: jaegertracing/all-in-one:1.75.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"

volumes:
  postgres-data:
