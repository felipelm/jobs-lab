services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://jobs_lab:jobs_lab@postgres:5432/jobs_lab
      JOBS_LAB_ENV: local
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobs_lab
      POSTGRES_USER: jobs_lab
      POSTGRES_PASSWORD: jobs_lab
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs_lab -d jobs_lab"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

